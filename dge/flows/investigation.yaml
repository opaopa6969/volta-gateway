name: investigation
display_name: "🔥 事故調査 — 事実認定 → 各部門証言 → 原因と再発防止"
auto_merge: false
decisions: true
decisions_dir: dge/decisions/

trigger_keywords: ["振り返って", "事故調査", "investigation", "postmortem", "インシデント", "障害分析"]

structure: investigation

description: |
  事故調査構造: まず時系列で事実を認定し、各部門が独立に証言し、
  原因分析と再発防止策を統合する。インシデントレビューに最適。

workflow:
  steps:
    - id: phase0
      display_name: "Phase 0: アーティファクト収集"
      description: |
        インシデントに関連する情報を収集:
        - アラートログ、障害タイムライン
        - 関連する git commit / deploy 履歴
        - 監視ダッシュボードの情報
        - 既存の postmortem ドキュメント（あれば）

    - id: theme
      display_name: "インシデント概要確認"

    - id: departments
      display_name: "関係部門選択"
      description: |
        インシデントに関与した部門/視点を選択。
        例: 開発(リヴァイ) + 運用(千石) + セキュリティ(Red Team) + ビジネス(大和田)
      mode: confirm

    - id: phase1
      display_name: "Phase 1: 事実認定（タイムライン）"
      description: |
        先輩（ナレーション）が事実のみを時系列で整理。フォーマット:
          ## タイムライン
          | 時刻 | 事象 | 影響 | 検知方法 |
          主観や推測は含めない。事実のみ。

    - id: phase2
      display_name: "Phase 2: 各部門の独立証言"
      description: |
        各部門が独立に証言。フォーマット:
          ## [部門名] 証言: [キャラ名]
          ### 何を知っていたか — インシデント前の認識
          ### 何をしたか — インシデント中の行動
          ### 何が足りなかったか — 自部門の不足
          ### 何を変えるべきか — 再発防止の提案
        部門間の会話は禁止（物語的独立性）。責任追及ではなく学習が目的。

    - id: phase3
      display_name: "Phase 3: 原因分析 + 再発防止"
      description: |
        全証言を統合して対話:
        - Five Whys で根本原因を掘る
        - 各部門の「足りなかったこと」を Gap として抽出
        - 再発防止策を Observe / Suggest / Act で整理
        - 「誰が悪いか」ではなく「何が壊れていたか」で議論

    - id: save
      display_name: "保存"
    - id: summary
      display_name: "サマリー + 選択肢"

must_rules:
  - id: timeline_facts
    text: "Phase 1 は事実のみ。推測・主観・責任追及を含めない"
  - id: department_independence
    text: "Phase 2 の各部門証言は独立。部門間の会話は禁止"
  - id: blameless
    text: "Phase 3 は blameless。「誰が悪い」ではなく「何が壊れていた」"
  - id: save
    text: "会話劇は保存（無条件）"
  - id: output_table
    text: "Gap 一覧テーブルを出力"
  - id: choices
    text: "番号付き選択肢を提示"

extract:
  type: gap
  marker: "→ Gap 発見:"
  format: "Observe / Suggest / Act"
  severity:
    - id: Critical
      display_name: "🔴 Critical"
    - id: High
      display_name: "🟠 High"
    - id: Medium
      display_name: "🟡 Medium"
    - id: Low
      display_name: "🟢 Low"

generate:
  specs: true

output_dir: dge/sessions/

post_actions:
  - id: dge_again
    display_name: "別の角度で再調査"
  - id: spec
    display_name: "再発防止策を Spec に"
  - id: switch_roundtable
    display_name: "座談会型に切替"
  - id: record_decision
    display_name: "設計判断を記録する"
  - id: later
    display_name: "後で"
